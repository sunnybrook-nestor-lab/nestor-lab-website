### basic settings

# site properties and page defaults
title: Nestor Lab
subtitle: Interventional Psychiatry Lab
description: Sunnybrook Research Institute · University of Toronto. We investigate novel neuromodulation, metabolic, and psychedelic approaches to treating psychiatric disorders.
logo-text: true
header: images/background.jpg
footer: images/background.jpg
header-dark: true
footer-dark: true
proofer: false

# site social media and other links
links:
  email: sean.nestor@sunnybrook.ca
  orcid: 0000-0002-8848-5027
  google-scholar: ""
  github: sunnybrook-nestor-lab

### Jekyll settings (do not edit below unless you know what you're doing)

# url of site
url: https://sunnybrook-nestor-lab.github.io

# baseurl of site
baseurl: /nestor-lab-website

# basic jekyll settings
markdown: kramdown
kramdown:
  math_engine: null
highlighter: rouge
encoding: UTF-8
future: true

# collections and their settings
collections:
  members:
    output: true
    permalink: /members/:title

# default front matter values
defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: members
    values:
      layout: member
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# jekyll spaceship settings
jekyll-spaceship:
  mathjax-processor:
    src: []
  mermaid-processor:
    src: []
